name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t flymate-build .

      - name: Build and deploy plugin
        run: docker run --rm -v "$PWD":/src flymate-build scripts/build.sh --deploy all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/deploy/FlyMate.zip
          generate_release_notes: true
